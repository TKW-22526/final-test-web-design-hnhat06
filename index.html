<!doctype html>
<html lang="vi">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>Cửa hàng Đồ Dùng Gia Đình</title>
	<link rel="stylesheet" href="css/style.css">
</head>
<body>
	<header class="site-header">
		<div class="container header-inner">
			<a class="logo" href="index.html">Đồ Dùng Trong Nhà</a>
			<nav class="main-nav">
				<a href="index.html">Trang chủ</a>
				<a href="html/san-pham.html">Sản phẩm</a>
				<a href="html/gioi-thieu.html">Giới thiệu</a>
				<a href="html/lien-he.html">Liên hệ</a>
			</nav>
			<div class="cart" id="cart">Giỏ hàng: <span id="cart-count">0</span></div>
		</div>
	</header>

	<main>
		<section class="hero">
			<div class="container">
				<h1>Đồ dùng gia đình chất lượng, giá hợp lý</h1>
				<p>Mua sắm tiện lợi — từ nhà bếp đến phòng tắm. Giao hàng nhanh, hỗ trợ đổi trả.</p>
				<a class="btn" href="html/san-pham.html">Xem sản phẩm</a>
			</div>
		</section>

		<section class="products container" aria-label="Sản phẩm nổi bật">
			<h2>Sản phẩm nổi bật</h2>
			<div class="grid" id="home-grid"></div>
		</section>
	</main>

	<footer class="site-footer">
		<div class="container">
			<p>&copy; 2026 Đồ Dùng Trong Nhà — Bán đồ dùng gia đình</p>
		</div>
	</footer>

	<script src="js/script.js"></script>
	<script>
		(function(){
			const grid = document.getElementById('home-grid');
			if(!grid || !window.products) return;
			// show first 9 products
			window.products.slice(0,9).forEach(p=>{
				const card = document.createElement('article');
				card.className = 'card';
				card.innerHTML = `
					<a href="html/chi-tiet.html?id=${p.id}"><img src="${productUrl(p.imgFile)}" alt="${p.title}"></a>
					<h3><a href="html/chi-tiet.html?id=${p.id}">${p.title}</a></h3>
					<p class="price">${p.price}</p>
					<button class="btn add-to-cart">Thêm vào giỏ</button>
				`;
				grid.appendChild(card);
			});
			bindAddToCartButtons(document);
		})();
	</script>
</body>
</html>
