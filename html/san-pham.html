
<!doctype html>
<html lang="vi">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>Sản phẩm — Đồ Dùng Nhà Tôi</title>
	<link rel="stylesheet" href="../css/style.css">
</head>
<body>
	<header class="site-header">
		<div class="container header-inner">
			<a class="logo" href="../index.html">Đồ Dùng Nhà Tôi</a>
			<nav class="main-nav">
				<a href="../index.html">Trang chủ</a>
				<a href="san-pham.html">Sản phẩm</a>
				<a href="gioi-thieu.html">Giới thiệu</a>
				<a href="lien-he.html">Liên hệ</a>
				<a href="gio-hang.html">Giỏ hàng</a>
			</nav>
			<div class="cart" id="cart">Giỏ hàng: <span id="cart-count">0</span></div>
		</div>
	</header>

	<main>
		<section class="products container">
			<h2>Danh mục sản phẩm</h2>
			<div class="search-bar">
				<label class="search-label" for="product-search">Tìm kiếm sản phẩm</label>
				<input id="product-search" class="search-input" type="search" placeholder="Nhập tên sản phẩm..." autocomplete="off">
			</div>
			<div class="grid" id="product-grid">
				<!-- Grid populated by JS -->
			</div>
			<p id="search-empty" class="search-empty" style="display:none;">Không tìm thấy sản phẩm phù hợp.</p>
		</section>
	</main>

	<footer class="site-footer">
		<div class="container">
			<p>&copy; 2026 Đồ Dùng Nhà Tôi</p>
		</div>
	</footer>

	<script src="../js/script.js"></script>
	<script>
		// render product grid from shared data
		(function(){
			const grid = document.getElementById('product-grid');
			const searchInput = document.getElementById('product-search');
			const emptyState = document.getElementById('search-empty');
			if(!grid || !window.products) return;

			function renderProducts(list){
				grid.innerHTML = '';
				list.forEach(p=>{
					const card = document.createElement('article');
					card.className = 'card';
					card.innerHTML = `
						<a href="chi-tiet.html?id=${p.id}"><img src="${productUrl(p.imgFile)}" alt="${p.title}"></a>
						<h3><a href="chi-tiet.html?id=${p.id}">${p.title}</a></h3>
						<p class="price">${p.price}</p>
						<button class="btn add-to-cart" data-id="${p.id}">Thêm vào giỏ</button>
					`;
					grid.appendChild(card);
				});
				bindAddToCartButtons(document);
				if(emptyState) emptyState.style.display = list.length ? 'none' : 'block';
			}

			function filterProducts(){
				const keyword = (searchInput && searchInput.value ? searchInput.value : '').trim().toLowerCase();
				const filtered = window.products.filter(p =>
					p.title.toLowerCase().includes(keyword) || p.desc.toLowerCase().includes(keyword)
				);
				renderProducts(filtered);
			}

			if(searchInput){
				searchInput.addEventListener('input', filterProducts);
			}
			renderProducts(window.products);
		})();
	</script>
</body>
</html>
